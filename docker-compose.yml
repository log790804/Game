services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: game-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: game-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
